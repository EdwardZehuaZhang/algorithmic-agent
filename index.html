<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUMI — Algorithmic Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      touch-action: none;
    }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    #state-label {
      color: #7fffff;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.8;
    }
    #bars {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .bar-label { color: rgba(255,255,255,0.5); font-size: 9px; width: 60px; flex-shrink: 0; }
    .bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #energy-fill { background: linear-gradient(to right, #0ff, #0af); }
    #alert-fill { background: linear-gradient(to right, #f0f, #f5a); }
    #controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }
    .ctrl-btn {
      background: rgba(127,255,255,0.1);
      border: 1px solid rgba(127,255,255,0.3);
      color: #7fffff;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { background: rgba(127,255,255,0.25); }
    #mic-status, #motion-status, #cam-status {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
    #permission-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    #permission-overlay h2 { color: #7fffff; font-size: 18px; letter-spacing: 2px; text-align: center; }
    #permission-overlay p { color: rgba(255,255,255,0.6); font-size: 12px; text-align: center; line-height: 1.6; }
    #start-btn {
      background: rgba(127,255,255,0.15);
      border: 1px solid rgba(127,255,255,0.5);
      color: #7fffff;
      font-size: 13px;
      letter-spacing: 3px;
      padding: 14px 32px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div id="permission-overlay">
  <h2>LUMI</h2>
  <p>An algorithmic bioluminescent agent.<br>Responds to touch, motion, sound, and light.</p>
  <p style="color:rgba(255,255,255,0.4); font-size:10px;">Requires microphone + motion + camera access.<br>Cover camera → angry. Shake → dizzy. Loud sound → scared.<br>Best experienced on mobile.</p>
  <button id="start-btn" onclick="initAgent()">AWAKEN LUMI</button>
</div>

<div id="ui" style="display:none">
  <div id="state-label">dormant</div>
  <div id="bars">
    <span class="bar-label">ENERGY</span>
    <div class="bar-track"><div class="bar-fill" id="energy-fill" style="width:50%"></div></div>
  </div>
  <div id="bars">
    <span class="bar-label">ALERTNESS</span>
    <div class="bar-track"><div class="bar-fill" id="alert-fill" style="width:0%"></div></div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="feed-btn">FEED</button>
    <button class="ctrl-btn" id="calm-btn">CALM</button>
    <button class="ctrl-btn" id="play-btn">PLAY</button>
  </div>
  <div id="mic-status">mic: inactive</div>
  <div id="cam-status">cam: inactive</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ============================================================
// LUMI — Algorithmic Agent
// AY26 Assignment 2: Algorithmic Agent
// NUS ID2109/ID3109 Design Platforms C
// ============================================================

// ── Agent Properties ────────────────────────────────────────
let energy = 50;       // 0-100: affects glow, pulse speed
let alertness = 0;     // 0-100: affects size, tentacle extension
let mood = 'calm';     // calm | curious | excited | startled

// ── State Machine ───────────────────────────────────────────
// States: dormant → aware → curious → excited → startled → dormant
// Reactive overrides: angry (camera covered), dizzy (shake), scared (loud mic)
const STATES = ['dormant', 'aware', 'curious', 'excited', 'startled', 'angry', 'dizzy', 'scared'];
let state = 'dormant';
let stateTimer = 0;
let stateTimeout = 0;

// ── Visual properties ────────────────────────────────────────
let pulsePhase = 0;
let tentacles = [];
const NUM_TENTACLES = 8;
let bodyRadius = 80;
let targetRadius = 80;

// ── Sensor state ─────────────────────────────────────────────
let micLevel = 0;
let tiltX = 0, tiltY = 0;    // from deviceorientation
let isTouching = false;
let touchX = 0, touchY = 0;
let micStream = null;
let analyser = null;
let micActive = false;

// Camera cover detection (brightness sampling)
let camVideo = null;
let camSampleCanvas = null;
let camSampleCtx = null;
let camBrightness = 1;       // 0 dark → 1 bright
let camCovered = false;
let camCoverFrames = 0;      // debounce frames while dark
let camActive = false;

// Shake detection (devicemotion)
let shakeIntensity = 0;      // smoothed 0..~50
let lastAccel = { x: 0, y: 0, z: 0 };
let motionActive = false;
let dizzySpin = 0;           // radians, for spinning effect

// ── Particle system ──────────────────────────────────────────
let particles = [];

// ── Color palettes per mood ──────────────────────────────────
const PALETTES = {
  calm:      { h: 180, s: 80, b: 90 },   // cyan
  curious:   { h: 200, s: 70, b: 95 },   // blue-cyan
  excited:   { h: 160, s: 90, b: 100 },  // green-cyan
  startled:  { h: 280, s: 85, b: 100 },  // purple-magenta
  angry:     { h: 0,   s: 95, b: 100 },  // red
  dizzy:     { h: 50,  s: 95, b: 100 },  // yellow
  scared:    { h: 25,  s: 95, b: 100 },  // orange
};

// Scared (loud mic) debounce
let loudFrames = 0;

// ── p5.js sketch ─────────────────────────────────────────────
const sketch = (p) => {
  p.setup = () => {
    const cnv = p.createCanvas(window.innerWidth, window.innerHeight - 110);
    cnv.parent(document.body);
    cnv.style('position', 'fixed');
    cnv.style('top', '0');
    cnv.style('left', '0');
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.noStroke();

    // Init tentacles
    for (let i = 0; i < NUM_TENTACLES; i++) {
      tentacles.push({
        angle: (p.TWO_PI / NUM_TENTACLES) * i,
        length: 0,
        targetLength: 0,
        wave: p.random(p.TWO_PI),
        speed: p.random(0.02, 0.05)
      });
    }
  };

  p.draw = () => {
    p.clear();
    // Angry = hot red; dizzy = muddy yellow; scared = warm orange dusk
    if (state === 'angry') p.background(0, 70, 8, 95);
    else if (state === 'dizzy') p.background(45, 40, 8, 95);
    else if (state === 'scared') p.background(20, 55, 8, 95);
    else p.background(220, 40, 5, 95);

    let cx = p.width / 2;
    let cy = p.height / 2;

    updateAgent(p);

    // Wobble when dizzy, jitter when angry, tremble when scared
    if (state === 'dizzy') {
      cx += p.sin(dizzySpin * 1.1) * 18;
      cy += p.cos(dizzySpin * 0.9) * 14;
    } else if (state === 'angry') {
      cx += p.random(-2.5, 2.5);
      cy += p.random(-2.5, 2.5);
    } else if (state === 'scared') {
      cx += p.random(-1.5, 1.5);
      cy += p.random(-1.5, 1.5);
    }

    drawAura(p, cx, cy);
    drawTentacles(p, cx, cy);
    drawBody(p, cx, cy);
    drawFace(p, cx, cy);
    drawParticles(p);
    updateUI();

    stateTimer++;
  };

  // ── Touch input ──────────────────────────────────────────
  p.touchStarted = () => {
    isTouching = true;
    touchX = p.mouseX;
    touchY = p.mouseY;
    handleTouch(p);
    return false;
  };
  p.touchEnded = () => { isTouching = false; return false; };
  p.mousePressed = () => {
    isTouching = true;
    touchX = p.mouseX;
    touchY = p.mouseY;
    handleTouch(p);
    return false;
  };
  p.mouseReleased = () => { isTouching = false; return false; };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight - 110);
  };
};

// ── Agent state machine ──────────────────────────────────────
function updateAgent(p) {
  pulsePhase += 0.04;

  // Read mic — RMS on time-domain is a true loudness measure; averaging
  // frequency bins dilutes loud signals because most bins are near zero.
  if (analyser) {
    const buf = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(buf);
    let sumSq = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = (buf[i] - 128) / 128;   // -1..1
      sumSq += v * v;
    }
    const rms = Math.sqrt(sumSq / buf.length);  // 0..1, but real-world ≤ ~0.3
    // Boost so normal talking ≈ 0.3–0.5, clap/yell ≈ 1.0
    const level = Math.min(rms * 3.5, 1);
    // Fast attack, slow release — react quickly to loud input, linger briefly
    const alpha = level > micLevel ? 0.5 : 0.15;
    micLevel = p.lerp(micLevel, level, alpha);
  } else {
    micLevel = p.lerp(micLevel, 0, 0.1);
  }

  // Sample camera brightness (covered = dark)
  sampleCamera(p);

  // Decay shake intensity (events add to it)
  shakeIntensity = p.lerp(shakeIntensity, 0, 0.05);

  // Advance dizzy spin proportional to shake / dizzy state
  if (state === 'dizzy') dizzySpin += 0.15;
  else dizzySpin *= 0.92;

  // Energy decay/regen
  energy = p.constrain(energy - 0.03 + micLevel * 0.5, 0, 100);

  // Alertness from tilt + touch
  const tiltMag = Math.sqrt(tiltX * tiltX + tiltY * tiltY);
  const targetAlert = p.constrain(
    tiltMag * 1.5 + (isTouching ? 30 : 0) + micLevel * 60,
    0, 100
  );
  alertness = p.lerp(alertness, targetAlert, 0.08);

  // Smooth body radius — scared cowers smaller
  if (state === 'scared') {
    targetRadius = 55 + p.sin(pulsePhase * 3) * 4;   // shrink + fast nervous pulse
  } else {
    targetRadius = p.map(alertness, 0, 100, 70, 110) + p.sin(pulsePhase * p.map(energy, 0, 100, 0.5, 2)) * 8;
  }
  bodyRadius = p.lerp(bodyRadius, targetRadius, 0.1);

  // Update tentacle targets — scared retracts them
  for (let t of tentacles) {
    if (state === 'scared') {
      t.targetLength = 15 + p.random(-3, 3);
    } else {
      t.targetLength = p.map(alertness, 0, 100, 20, 120) + p.random(-5, 5);
    }
    t.length = p.lerp(t.length, t.targetLength, 0.06);
    t.wave += t.speed;
  }

  // State transitions
  updateState(p);

  // Spawn particles on excitement
  if (state === 'excited' || state === 'startled') {
    if (Math.random() < 0.3) spawnParticle(p);
  }

  // Update particles
  particles = particles.filter(pt => pt.life > 0);
  for (let pt of particles) {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vy += 0.05;
    pt.life -= 2;
  }
}

function updateState(p) {
  const prevState = state;

  // Track sustained loud mic input (avoid triggering on single spikes)
  if (micLevel > 0.35) loudFrames = Math.min(loudFrames + 3, 30);
  else loudFrames = Math.max(loudFrames - 1, 0);
  const isLoud = loudFrames > 3;

  // High-priority reactive overrides — order matters.
  // Priority: dizzy (shake) > scared (loud mic) > angry (camera cover)
  if (shakeIntensity > 18 && state !== 'dizzy') {
    transitionTo('dizzy');
  } else if (isLoud && state !== 'dizzy' && state !== 'scared') {
    transitionTo('scared');
  } else if (camCovered && state !== 'dizzy' && state !== 'scared' && state !== 'angry') {
    transitionTo('angry');
  }

  if (state === 'dizzy') {
    mood = 'dizzy';
    // Stay dizzy while shaking; give at least a short recovery
    if (stateTimer > 90 && shakeIntensity < 4) transitionTo('aware');

  } else if (state === 'scared') {
    mood = 'scared';
    // Stay scared while loud; recover once it quiets down
    if (!isLoud && stateTimer > 45 && micLevel < 0.2) transitionTo('aware');

  } else if (state === 'angry') {
    mood = 'angry';
    // Stay angry while covered; calm back down once uncovered
    if (!camCovered && stateTimer > 60) transitionTo('aware');

  } else if (state === 'dormant') {
    mood = 'calm';
    if (alertness > 15 || micLevel > 0.1) transitionTo('aware');

  } else if (state === 'aware') {
    mood = 'calm';
    if (alertness > 40 || micLevel > 0.2) transitionTo('curious');
    if (stateTimer > 180 && alertness < 10) transitionTo('dormant');

  } else if (state === 'curious') {
    mood = 'curious';
    if (alertness > 70 || micLevel > 0.4) transitionTo('excited');
    if (isTouching) transitionTo('excited');
    if (stateTimer > 300 && alertness < 20) transitionTo('aware');

  } else if (state === 'excited') {
    mood = 'excited';
    if (micLevel > 0.7 || alertness > 90) transitionTo('startled');
    if (stateTimer > 240 && alertness < 40) transitionTo('curious');

  } else if (state === 'startled') {
    mood = 'startled';
    // Auto-return to curious after timeout
    if (stateTimer > 120) transitionTo('curious');
  }

  if (state !== prevState) document.getElementById('state-label').textContent = state;
}

function transitionTo(newState) {
  state = newState;
  stateTimer = 0;
}

// ── Drawing ──────────────────────────────────────────────────
function drawAura(p, cx, cy) {
  const pal = PALETTES[mood];
  const glowRadius = bodyRadius * p.map(energy, 0, 100, 1.5, 3.0);
  const alpha = p.map(energy, 0, 100, 10, 35);

  for (let r = glowRadius; r > 0; r -= glowRadius * 0.1) {
    const a = p.map(r, 0, glowRadius, alpha, 0);
    p.fill(pal.h, pal.s, pal.b, a);
    p.ellipse(cx, cy, r * 2, r * 2);
  }
}

function drawTentacles(p, cx, cy) {
  const pal = PALETTES[mood];
  for (let t of tentacles) {
    const waveOff = p.sin(t.wave) * 20;
    const baseX = cx + p.cos(t.angle) * bodyRadius * 0.8;
    const baseY = cy + p.sin(t.angle) * bodyRadius * 0.8;
    const endX = cx + p.cos(t.angle + 0.3) * (bodyRadius + t.length) + waveOff;
    const endY = cy + p.sin(t.angle + 0.3) * (bodyRadius + t.length);

    p.stroke(pal.h, pal.s - 10, pal.b, 60);
    p.strokeWeight(2.5);
    p.noFill();

    p.beginShape();
    p.curveVertex(baseX, baseY);
    p.curveVertex(baseX, baseY);
    const mx = (baseX + endX) / 2 + p.sin(t.wave * 1.5) * 30;
    const my = (baseY + endY) / 2 + p.cos(t.wave * 1.3) * 20;
    p.curveVertex(mx, my);
    p.curveVertex(endX, endY);
    p.curveVertex(endX, endY);
    p.endShape();
    p.noStroke();
  }
}

function drawBody(p, cx, cy) {
  const pal = PALETTES[mood];
  const r = bodyRadius;

  // Outer shell
  p.fill(pal.h, pal.s - 20, pal.b - 20, 70);
  p.ellipse(cx, cy, r * 2.2, r * 2);

  // Core
  const energyGlow = p.map(energy, 0, 100, 40, 85);
  p.fill(pal.h, pal.s, energyGlow, 90);
  p.ellipse(cx, cy, r * 1.8, r * 1.6);

  // Inner bright core
  p.fill(pal.h + 20, pal.s - 30, 100, 60);
  p.ellipse(cx, cy, r * 0.9, r * 0.8);

  // Pulse ring
  const pulseSz = r * (1.9 + p.sin(pulsePhase * 2) * 0.1);
  p.stroke(pal.h, 60, 100, 20);
  p.strokeWeight(1.5);
  p.noFill();
  p.ellipse(cx, cy, pulseSz * 2, pulseSz * 1.8);
  p.noStroke();
}

function drawFace(p, cx, cy) {
  const pal = PALETTES[mood];
  const eyeSpread = p.map(alertness, 0, 100, 14, 22);
  let eyeSize = p.map(energy, 0, 100, 4, 9);
  // Scared = wide-eyed
  if (state === 'scared') eyeSize *= 1.5;

  // Eyes
  p.fill(pal.h, 20, 100, 90);
  p.ellipse(cx - eyeSpread, cy - 8, eyeSize * 2, eyeSize * 2.5);
  p.ellipse(cx + eyeSpread, cy - 8, eyeSize * 2, eyeSize * 2.5);

  // Pupils (track touch / tilt)
  const pupilOff = 3;
  const tiltOffX = p.constrain(tiltX * 0.05, -pupilOff, pupilOff);
  const tiltOffY = p.constrain(tiltY * 0.05, -pupilOff, pupilOff);
  p.fill(pal.h - 30, 90, 20, 95);

  if (state === 'dizzy') {
    // Swirly spiral pupils
    p.noFill();
    p.stroke(pal.h - 30, 90, 20, 95);
    p.strokeWeight(1.5);
    for (const ex of [cx - eyeSpread, cx + eyeSpread]) {
      p.push();
      p.translate(ex, cy - 8);
      p.rotate(dizzySpin);
      p.beginShape();
      for (let a = 0; a < p.TWO_PI * 2; a += 0.3) {
        const rr = a * eyeSize * 0.22;
        p.vertex(p.cos(a) * rr, p.sin(a) * rr);
      }
      p.endShape();
      p.pop();
    }
    p.noStroke();
  } else {
    p.ellipse(cx - eyeSpread + tiltOffX, cy - 8 + tiltOffY, eyeSize * 0.9, eyeSize * 1.2);
    p.ellipse(cx + eyeSpread + tiltOffX, cy - 8 + tiltOffY, eyeSize * 0.9, eyeSize * 1.2);
  }

  // Angry eyebrows — diagonal slashes above eyes
  if (state === 'angry') {
    p.stroke(pal.h, 90, 90, 95);
    p.strokeWeight(3);
    const browY = cy - 8 - eyeSize * 1.6;
    const browLen = eyeSize * 1.8;
    // Left brow: outer low, inner high (angled down toward nose)
    p.line(cx - eyeSpread - browLen * 0.6, browY - 3,
           cx - eyeSpread + browLen * 0.4, browY + 5);
    // Right brow: mirror
    p.line(cx + eyeSpread + browLen * 0.6, browY - 3,
           cx + eyeSpread - browLen * 0.4, browY + 5);
    p.noStroke();
  }

  // Mouth expression by state
  p.stroke(pal.h, 30, 100, 70);
  p.strokeWeight(2);
  p.noFill();
  if (state === 'angry') {
    // Gritted frown
    p.stroke(pal.h, 90, 90, 95);
    p.strokeWeight(2.5);
    p.arc(cx, cy + 20, 26, 18, p.PI, p.TWO_PI);
    // teeth line
    p.strokeWeight(1);
    p.line(cx - 10, cy + 14, cx + 10, cy + 14);
  } else if (state === 'dizzy') {
    // Wavy woozy mouth
    p.stroke(pal.h - 20, 60, 100, 85);
    p.strokeWeight(2);
    p.beginShape();
    for (let i = 0; i <= 20; i++) {
      const t = i / 20;
      const mx = cx - 14 + t * 28;
      const my = cy + 14 + p.sin(t * p.PI * 3 + dizzySpin) * 3;
      p.vertex(mx, my);
    }
    p.endShape();
  } else if (state === 'scared') {
    // Quivering small O
    p.stroke(pal.h, 80, 100, 90);
    p.fill(pal.h - 10, 70, 20, 95);
    const wobble = p.sin(p.frameCount * 0.6) * 1.2;
    p.ellipse(cx, cy + 14, 10 + wobble, 14 + wobble);
    p.noFill();
  } else if (state === 'startled') {
    // Open O mouth
    p.ellipse(cx, cy + 14, 14, 18);
  } else if (state === 'excited') {
    // Big smile
    p.arc(cx, cy + 10, 28, 20, 0, p.PI);
  } else if (state === 'curious') {
    // Small smile
    p.arc(cx, cy + 10, 18, 12, 0, p.PI);
  } else {
    // Neutral line
    p.line(cx - 10, cy + 14, cx + 10, cy + 14);
  }
  p.noStroke();
}

function drawParticles(p) {
  for (let pt of particles) {
    p.fill(pt.h, 80, 100, pt.life);
    p.ellipse(pt.x, pt.y, pt.size, pt.size);
  }
}

function spawnParticle(p) {
  const cx = p.width / 2;
  const cy = p.height / 2;
  const angle = p.random(p.TWO_PI);
  const speed = p.random(1, 4);
  particles.push({
    x: cx + p.cos(angle) * bodyRadius,
    y: cy + p.sin(angle) * bodyRadius,
    vx: p.cos(angle) * speed,
    vy: p.sin(angle) * speed - 2,
    size: p.random(3, 8),
    h: PALETTES[mood].h + p.random(-30, 30),
    life: 80
  });
}

// ── Touch handler ────────────────────────────────────────────
function handleTouch(p) {
  // Feed button area handled by HTML buttons
  energy = p.constrain(energy + 15, 0, 100);
  alertness = p.constrain(alertness + 25, 0, 100);
  for (let i = 0; i < 6; i++) spawnParticle(p);
}

// ── UI update ────────────────────────────────────────────────
function updateUI() {
  document.getElementById('energy-fill').style.width = energy + '%';
  document.getElementById('alert-fill').style.width = alertness + '%';
}

// ── Sensor init ──────────────────────────────────────────────
async function initAgent() {
  document.getElementById('permission-overlay').style.display = 'none';
  document.getElementById('ui').style.display = 'flex';

  // Fire all permission requests SYNCHRONOUSLY inside the user gesture.
  // iOS Safari invalidates the gesture after the first `await`, so any
  // requestPermission/getUserMedia started later silently fails.
  const orientPromise = (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function')
    ? DeviceOrientationEvent.requestPermission().catch(() => 'denied')
    : Promise.resolve('granted');

  const motionPromise = (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function')
    ? DeviceMotionEvent.requestPermission().catch(() => 'denied')
    : Promise.resolve('granted');

  // Fire mic + camera requests independently so one denial doesn't kill the other.
  const micPromise = navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null);
  const camPromise = navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: 64, height: 48 }, audio: false
  }).catch(() => null);

  const orientRes = await orientPromise;
  if (orientRes === 'granted') attachOrientation();

  const motionRes = await motionPromise;
  if (motionRes === 'granted') attachMotion();

  // Desktop fallback — shake the mouse
  attachMouseShakeFallback();

  const micStreamRes = await micPromise;
  if (micStreamRes) {
    try {
      const ctx = new AudioContext();
      const src = ctx.createMediaStreamSource(micStreamRes);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 256;
      src.connect(analyser);
      micStream = micStreamRes;
      micActive = true;
      document.getElementById('mic-status').textContent = 'mic: active';
    } catch (e) {
      document.getElementById('mic-status').textContent = 'mic: error';
    }
  } else {
    document.getElementById('mic-status').textContent = 'mic: denied — use touch/motion';
  }

  const camStreamRes = await camPromise;
  if (camStreamRes) {
    await initCameraFromStream(camStreamRes);
  } else {
    document.getElementById('cam-status').textContent = 'cam: denied';
  }

  // Start p5
  new p5(sketch);

  // Control buttons
  document.getElementById('feed-btn').addEventListener('click', () => {
    energy = Math.min(energy + 20, 100);
    transitionTo(alertness > 40 ? 'curious' : 'aware');
    for (let i = 0; i < 5; i++) spawnParticle({ width: window.innerWidth, height: window.innerHeight - 110, random: Math.random, cos: Math.cos, sin: Math.sin, TWO_PI: Math.PI * 2 });
  });
  document.getElementById('calm-btn').addEventListener('click', () => {
    alertness = Math.max(alertness - 40, 0);
    transitionTo('aware');
  });
  document.getElementById('play-btn').addEventListener('click', () => {
    alertness = Math.min(alertness + 50, 100);
    transitionTo('excited');
  });
}

function attachOrientation() {
  window.addEventListener('deviceorientation', (e) => {
    tiltX = e.gamma || 0;  // left-right tilt
    tiltY = e.beta || 0;   // front-back tilt
  });
}

function attachMotion() {
  window.addEventListener('devicemotion', (e) => {
    const a = e.accelerationIncludingGravity || e.acceleration;
    if (!a) return;
    const dx = (a.x || 0) - lastAccel.x;
    const dy = (a.y || 0) - lastAccel.y;
    const dz = (a.z || 0) - lastAccel.z;
    const delta = Math.sqrt(dx * dx + dy * dy + dz * dz);
    // Threshold out gentle motion; accumulate sharp jerks
    if (delta > 3) shakeIntensity = Math.min(shakeIntensity + delta, 60);
    lastAccel = { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
    motionActive = true;
  });
}

// Fallback: desktops (no devicemotion). Detect rapid mouse shaking.
let mouseHistory = [];
function attachMouseShakeFallback() {
  window.addEventListener('mousemove', (e) => {
    const now = performance.now();
    mouseHistory.push({ x: e.clientX, y: e.clientY, t: now });
    mouseHistory = mouseHistory.filter(s => now - s.t < 300);
    if (mouseHistory.length < 5) return;
    // Count direction reversals as a proxy for "shaking"
    let reversals = 0;
    for (let i = 2; i < mouseHistory.length; i++) {
      const dx1 = mouseHistory[i - 1].x - mouseHistory[i - 2].x;
      const dx2 = mouseHistory[i].x - mouseHistory[i - 1].x;
      if (dx1 * dx2 < 0 && Math.abs(dx2) > 8) reversals++;
    }
    if (reversals >= 3) shakeIntensity = Math.min(shakeIntensity + 12, 60);
  });
}

// Camera init — used for cover detection. Shares the combined stream with mic.
async function initCameraFromStream(stream) {
  try {
    // Check the stream actually has a video track (could be audio-only if cam denied).
    if (!stream.getVideoTracks || stream.getVideoTracks().length === 0) {
      document.getElementById('cam-status').textContent = 'cam: no video track';
      return;
    }
    camVideo = document.createElement('video');
    camVideo.srcObject = stream;
    camVideo.setAttribute('playsinline', '');
    camVideo.setAttribute('autoplay', '');
    camVideo.muted = true;
    // iOS Safari won't play display:none videos — keep it in DOM but invisible.
    camVideo.style.cssText = 'position:fixed;top:0;left:0;width:2px;height:2px;opacity:0.01;pointer-events:none;z-index:-1;';
    document.body.appendChild(camVideo);
    await camVideo.play();
    camSampleCanvas = document.createElement('canvas');
    camSampleCanvas.width = 32;
    camSampleCanvas.height = 24;
    camSampleCtx = camSampleCanvas.getContext('2d', { willReadFrequently: true });
    camActive = true;
    document.getElementById('cam-status').textContent = 'cam: active';
  } catch (e) {
    document.getElementById('cam-status').textContent = 'cam: play failed — ' + (e.message || e.name);
  }
}

let camVariance = 1;
function sampleCamera(p) {
  if (!camActive || !camVideo || camVideo.readyState < 2) return;
  // Sample every ~6 frames to save CPU
  if (p.frameCount % 6 !== 0) return;
  try {
    camSampleCtx.drawImage(camVideo, 0, 0, camSampleCanvas.width, camSampleCanvas.height);
    const data = camSampleCtx.getImageData(0, 0, camSampleCanvas.width, camSampleCanvas.height).data;
    const pixels = data.length / 4;
    // First pass: mean luma
    let sum = 0;
    const lumas = new Float32Array(pixels);
    for (let i = 0, j = 0; i < data.length; i += 4, j++) {
      const L = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      lumas[j] = L;
      sum += L;
    }
    const meanL = sum / pixels;           // 0..255
    // Second pass: variance (how uniform)
    let varSum = 0;
    for (let j = 0; j < pixels; j++) {
      const d = lumas[j] - meanL;
      varSum += d * d;
    }
    const stdDev = Math.sqrt(varSum / pixels) / 255;  // 0..1
    const avg = meanL / 255;              // 0..1

    camBrightness = p.lerp(camBrightness, avg, 0.3);
    camVariance   = p.lerp(camVariance, stdDev, 0.3);

    // Covered = (dark) OR (fairly dark AND very uniform — a finger lets warm reddish
    // light through but the image is flat). Tuned for auto-exposure boosting gain.
    const isDark = camBrightness < 0.18;
    const isFlat = camVariance < 0.06;
    const covered = isDark || (camBrightness < 0.35 && isFlat);

    if (covered) camCoverFrames = Math.min(camCoverFrames + 6, 120);
    else camCoverFrames = Math.max(camCoverFrames - 6, 0);
    camCovered = camCoverFrames > 24;

    // Live debug readout so you can calibrate
    const camStatus = document.getElementById('cam-status');
    if (camStatus) {
      camStatus.textContent = `b=${camBrightness.toFixed(2)} v=${camVariance.toFixed(2)} mic=${micLevel.toFixed(2)} shake=${shakeIntensity.toFixed(0)}${camCovered ? ' COVERED' : ''}`;
    }
  } catch (e) { /* video not ready */ }
}
</script>
