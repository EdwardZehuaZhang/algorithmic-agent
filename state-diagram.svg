<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 880" width="1120" height="880" style="font-family: 'Menlo', 'Monaco', monospace">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7fffff"/>
    </marker>
    <marker id="arrow-dim" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(127,255,255,0.45)"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c878"/>
    </marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b400c8"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff4040"/>
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff9030"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffd040"/>
    </marker>
    <marker id="arrow-red-dim" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,64,64,0.5)"/>
    </marker>
    <marker id="arrow-orange-dim" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,144,48,0.5)"/>
    </marker>
    <marker id="arrow-yellow-dim" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,208,64,0.5)"/>
    </marker>
  </defs>

  <rect width="1120" height="880" fill="#05080f"/>

  <!-- Title -->
  <text x="560" y="40" fill="#7fffff" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="4">LUMI — STATE TRANSITION DIAGRAM</text>
  <text x="560" y="60" fill="rgba(127,255,255,0.5)" font-size="11" text-anchor="middle">AY26 Assignment 2: Algorithmic Agent | NUS Design Platforms C</text>

  <!-- Column headers -->
  <text x="280" y="100" fill="rgba(127,255,255,0.85)" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">CORE PROGRESSION</text>
  <text x="280" y="116" fill="rgba(127,255,255,0.4)" font-size="9" text-anchor="middle">escalation chain · timer-based decay</text>

  <text x="860" y="100" fill="rgba(255,180,120,0.85)" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">REACTIVE OVERRIDES</text>
  <text x="860" y="116" fill="rgba(255,180,120,0.4)" font-size="9" text-anchor="middle">interrupt any state · recover to aware</text>

  <!-- Vertical divider -->
  <line x1="560" y1="95" x2="560" y2="720" stroke="rgba(127,255,255,0.1)" stroke-width="1" stroke-dasharray="2,4"/>

  <!-- ============ CORE PROGRESSION (left column) ============ -->

  <!-- DORMANT -->
  <ellipse cx="280" cy="170" rx="95" ry="32" fill="rgba(0,180,180,0.12)" stroke="#00b4b4" stroke-width="2"/>
  <text x="280" y="168" fill="#7fffff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">DORMANT</text>
  <text x="280" y="184" fill="rgba(127,255,255,0.5)" font-size="9" text-anchor="middle">mood: calm · cyan · low energy</text>

  <!-- AWARE -->
  <ellipse cx="280" cy="280" rx="95" ry="32" fill="rgba(0,160,220,0.14)" stroke="#00a0dc" stroke-width="2"/>
  <text x="280" y="278" fill="#7fffff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">AWARE</text>
  <text x="280" y="294" fill="rgba(127,255,255,0.5)" font-size="9" text-anchor="middle">mood: calm · cyan · eyes open</text>

  <!-- CURIOUS -->
  <ellipse cx="280" cy="390" rx="95" ry="32" fill="rgba(0,140,255,0.16)" stroke="#008cff" stroke-width="2"/>
  <text x="280" y="388" fill="#7fffff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">CURIOUS</text>
  <text x="280" y="404" fill="rgba(127,255,255,0.5)" font-size="9" text-anchor="middle">mood: curious · blue · tentacles out</text>

  <!-- EXCITED -->
  <ellipse cx="280" cy="500" rx="95" ry="32" fill="rgba(0,200,120,0.16)" stroke="#00c878" stroke-width="2"/>
  <text x="280" y="498" fill="#7fffff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">EXCITED</text>
  <text x="280" y="514" fill="rgba(127,255,255,0.5)" font-size="9" text-anchor="middle">mood: excited · green · particles</text>

  <!-- STARTLED -->
  <ellipse cx="280" cy="610" rx="95" ry="32" fill="rgba(180,0,200,0.16)" stroke="#b400c8" stroke-width="2"/>
  <text x="280" y="608" fill="#df7fff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">STARTLED</text>
  <text x="280" y="624" fill="rgba(200,127,255,0.5)" font-size="9" text-anchor="middle">mood: startled · purple · O-mouth</text>

  <!-- Forward arrows (solid, right side of nodes) -->
  <!-- DORMANT → AWARE -->
  <line x1="280" y1="202" x2="280" y2="248" stroke="#7fffff" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="295" y="221" fill="#7fffff" font-size="9">alertness &gt; 15</text>
  <text x="295" y="233" fill="#7fffff" font-size="9">OR mic &gt; 0.1</text>

  <!-- AWARE → CURIOUS -->
  <line x1="280" y1="312" x2="280" y2="358" stroke="#7fffff" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="295" y="331" fill="#7fffff" font-size="9">alertness &gt; 40</text>
  <text x="295" y="343" fill="#7fffff" font-size="9">OR mic &gt; 0.2</text>

  <!-- CURIOUS → EXCITED -->
  <line x1="280" y1="422" x2="280" y2="468" stroke="#00c878" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <text x="295" y="437" fill="#00c878" font-size="9">alertness &gt; 70</text>
  <text x="295" y="449" fill="#00c878" font-size="9">OR mic &gt; 0.4</text>
  <text x="295" y="461" fill="#00c878" font-size="9">OR touch</text>

  <!-- EXCITED → STARTLED -->
  <line x1="280" y1="532" x2="280" y2="578" stroke="#b400c8" stroke-width="1.6" marker-end="url(#arrow-purple)"/>
  <text x="295" y="551" fill="#df7fff" font-size="9">mic &gt; 0.7</text>
  <text x="295" y="563" fill="#df7fff" font-size="9">OR alertness &gt; 90</text>

  <!-- Decay arrows (dashed, left side of nodes) -->
  <!-- AWARE → DORMANT -->
  <path d="M 185 270 Q 130 225 185 182" fill="none" stroke="rgba(127,255,255,0.4)" stroke-width="1.2" marker-end="url(#arrow-dim)" stroke-dasharray="4,3"/>
  <text x="95" y="224" fill="rgba(127,255,255,0.5)" font-size="8">timer &gt; 180</text>
  <text x="95" y="235" fill="rgba(127,255,255,0.5)" font-size="8">&amp;&amp; alert &lt; 10</text>

  <!-- CURIOUS → AWARE -->
  <path d="M 185 380 Q 130 335 185 292" fill="none" stroke="rgba(127,255,255,0.4)" stroke-width="1.2" marker-end="url(#arrow-dim)" stroke-dasharray="4,3"/>
  <text x="95" y="334" fill="rgba(127,255,255,0.5)" font-size="8">timer &gt; 300</text>
  <text x="95" y="345" fill="rgba(127,255,255,0.5)" font-size="8">&amp;&amp; alert &lt; 20</text>

  <!-- EXCITED → CURIOUS -->
  <path d="M 185 490 Q 130 445 185 402" fill="none" stroke="rgba(0,200,120,0.45)" stroke-width="1.2" marker-end="url(#arrow-dim)" stroke-dasharray="4,3"/>
  <text x="95" y="444" fill="rgba(0,200,120,0.6)" font-size="8">timer &gt; 240</text>
  <text x="95" y="455" fill="rgba(0,200,120,0.6)" font-size="8">&amp;&amp; alert &lt; 40</text>

  <!-- STARTLED → CURIOUS -->
  <path d="M 185 600 Q 110 500 185 402" fill="none" stroke="rgba(180,0,200,0.45)" stroke-width="1.2" marker-end="url(#arrow-dim)" stroke-dasharray="4,3"/>
  <text x="55" y="500" fill="rgba(200,127,255,0.6)" font-size="8">timer &gt; 120</text>

  <!-- ============ REACTIVE OVERRIDES (right column) ============ -->

  <!-- Priority label -->
  <rect x="720" y="138" width="280" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,180,120,0.3)" stroke-width="1" rx="4"/>
  <text x="860" y="152" fill="rgba(255,220,180,0.9)" font-size="9" text-anchor="middle" font-weight="bold">PRIORITY ORDER</text>
  <text x="860" y="164" fill="rgba(255,220,180,0.7)" font-size="9" text-anchor="middle">dizzy &gt; scared &gt; angry &gt; normal</text>

  <!-- DIZZY -->
  <ellipse cx="860" cy="230" rx="110" ry="32" fill="rgba(255,208,64,0.15)" stroke="#ffd040" stroke-width="2"/>
  <text x="860" y="228" fill="#ffe080" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">DIZZY</text>
  <text x="860" y="244" fill="rgba(255,224,128,0.55)" font-size="9" text-anchor="middle">yellow · spiral pupils · wobble</text>

  <!-- SCARED -->
  <ellipse cx="860" cy="360" rx="110" ry="32" fill="rgba(255,144,48,0.15)" stroke="#ff9030" stroke-width="2"/>
  <text x="860" y="358" fill="#ffb060" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">SCARED</text>
  <text x="860" y="374" fill="rgba(255,176,96,0.55)" font-size="9" text-anchor="middle">orange · cower · wide eyes</text>

  <!-- ANGRY -->
  <ellipse cx="860" cy="490" rx="110" ry="32" fill="rgba(255,64,64,0.15)" stroke="#ff4040" stroke-width="2"/>
  <text x="860" y="488" fill="#ff7070" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="2">ANGRY</text>
  <text x="860" y="504" fill="rgba(255,112,112,0.55)" font-size="9" text-anchor="middle">red · eyebrows · frown · jitter</text>

  <!-- "From any state" hub -->
  <rect x="610" y="340" width="92" height="40" fill="rgba(255,255,255,0.04)" stroke="rgba(255,220,180,0.4)" stroke-width="1.2" rx="6" stroke-dasharray="3,3"/>
  <text x="656" y="356" fill="rgba(255,220,180,0.9)" font-size="10" text-anchor="middle" font-weight="bold">ANY</text>
  <text x="656" y="370" fill="rgba(255,220,180,0.7)" font-size="9" text-anchor="middle">CORE STATE</text>

  <!-- Arrows: hub → DIZZY -->
  <path d="M 700 348 Q 770 290 760 232" fill="none" stroke="#ffd040" stroke-width="1.6" marker-end="url(#arrow-yellow)"/>
  <text x="720" y="270" fill="#ffd040" font-size="9">shake &gt; 18</text>
  <text x="720" y="282" fill="#ffd040" font-size="9">(devicemotion)</text>

  <!-- Arrows: hub → SCARED -->
  <line x1="702" y1="360" x2="750" y2="360" stroke="#ff9030" stroke-width="1.6" marker-end="url(#arrow-orange)"/>
  <text x="710" y="354" fill="#ff9030" font-size="9">mic &gt; 0.35 sustained</text>

  <!-- Arrows: hub → ANGRY -->
  <path d="M 700 372 Q 770 430 760 488" fill="none" stroke="#ff4040" stroke-width="1.6" marker-end="url(#arrow-red)"/>
  <text x="720" y="440" fill="#ff7070" font-size="9">camera covered</text>
  <text x="720" y="452" fill="#ff7070" font-size="9">(dark + uniform)</text>

  <!-- Recovery arrows: reactive → AWARE (long dashed back to left column) -->
  <!-- DIZZY → AWARE -->
  <path d="M 750 230 Q 480 180 377 272" fill="none" stroke="rgba(255,208,64,0.5)" stroke-width="1.2" marker-end="url(#arrow-yellow-dim)" stroke-dasharray="5,3"/>
  <text x="505" y="195" fill="rgba(255,224,128,0.7)" font-size="8">shake &lt; 4 &amp;&amp; timer &gt; 90 → aware</text>

  <!-- SCARED → AWARE -->
  <path d="M 750 360 Q 560 340 377 288" fill="none" stroke="rgba(255,144,48,0.5)" stroke-width="1.2" marker-end="url(#arrow-orange-dim)" stroke-dasharray="5,3"/>
  <text x="500" y="325" fill="rgba(255,176,96,0.7)" font-size="8">mic &lt; 0.2 &amp;&amp; timer &gt; 45 → aware</text>

  <!-- ANGRY → AWARE -->
  <path d="M 750 490 Q 480 440 377 296" fill="none" stroke="rgba(255,64,64,0.5)" stroke-width="1.2" marker-end="url(#arrow-red-dim)" stroke-dasharray="5,3"/>
  <text x="500" y="465" fill="rgba(255,112,112,0.7)" font-size="8">!covered &amp;&amp; timer &gt; 60 → aware</text>

  <!-- ============ INPUT LEGEND ============ -->
  <rect x="40" y="730" width="1040" height="130" fill="rgba(255,255,255,0.03)" stroke="rgba(127,255,255,0.15)" stroke-width="1" rx="8"/>

  <!-- Properties -->
  <text x="60" y="752" fill="rgba(127,255,255,0.85)" font-size="11" font-weight="bold" letter-spacing="2">PROPERTIES</text>
  <text x="60" y="772" fill="rgba(255,255,255,0.6)" font-size="9">energy (0–100) → glow, pulse speed, eye size</text>
  <text x="60" y="788" fill="rgba(255,255,255,0.6)" font-size="9">alertness (0–100) → body size, tentacles, eye spread</text>
  <text x="60" y="804" fill="rgba(255,255,255,0.6)" font-size="9">mood → color palette (8 states)</text>
  <text x="60" y="820" fill="rgba(255,255,255,0.6)" font-size="9">stateTimer → frames in current state</text>
  <text x="60" y="836" fill="rgba(255,255,255,0.6)" font-size="9">loudFrames / camCoverFrames → debounce counters</text>

  <!-- Inputs -->
  <text x="410" y="752" fill="rgba(127,255,255,0.85)" font-size="11" font-weight="bold" letter-spacing="2">INPUTS</text>
  <text x="410" y="772" fill="rgba(255,255,255,0.6)" font-size="9">mic (RMS on time-domain × 3.5) → energy, alertness, SCARED</text>
  <text x="410" y="788" fill="rgba(255,255,255,0.6)" font-size="9">deviceorientation (tilt) → alertness, pupil offset</text>
  <text x="410" y="804" fill="rgba(255,255,255,0.6)" font-size="9">devicemotion (Δ accel) → shake intensity → DIZZY</text>
  <text x="410" y="820" fill="rgba(255,255,255,0.6)" font-size="9">camera (brightness + variance) → ANGRY</text>
  <text x="410" y="836" fill="rgba(255,255,255,0.6)" font-size="9">touch / buttons (Feed · Calm · Play) → direct</text>

  <!-- Triggers summary -->
  <text x="780" y="752" fill="rgba(255,180,120,0.85)" font-size="11" font-weight="bold" letter-spacing="2">OVERRIDE TRIGGERS</text>
  <text x="780" y="772" fill="rgba(255,208,64,0.75)" font-size="9">DIZZY ← shake &gt; 18 (device or mouse)</text>
  <text x="780" y="788" fill="rgba(255,144,48,0.75)" font-size="9">SCARED ← mic &gt; 0.35 for ≥ 3 sample frames</text>
  <text x="780" y="804" fill="rgba(255,64,64,0.75)" font-size="9">ANGRY ← brightness &lt; 0.18 OR (&lt; 0.35 &amp;&amp; var &lt; 0.06)</text>
  <text x="780" y="820" fill="rgba(255,255,255,0.5)" font-size="9">Each override blocks lower-priority overrides</text>
  <text x="780" y="836" fill="rgba(255,255,255,0.5)" font-size="9">All overrides recover → AWARE on release + timer</text>
</svg>
